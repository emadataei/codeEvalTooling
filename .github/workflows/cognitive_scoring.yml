name: Cognitive Scoring & Tier Assignment

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Also allow manual trigger for debugging
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run this workflow'
        required: false
        default: 'true'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  cognitive-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Static Analysis
        run: |
          # Run linting and complexity analysis
          pylint --load-plugins=pylint.extensions.mccabe --reports=y .code-analysis/ || true
          
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.py
            **/*.js
            **/*.ts
            **/*.jsx
            **/*.tsx
            **/*.mjs
            **/*.cjs
            **/*.vue
            **/*.svelte
            **/*.java
            **/*.cs
            **/*.go
            **/*.rs
            sample-project/**/*.js
            sample-project/**/*.ts
            sample-project/**/*.jsx
            sample-project/**/*.tsx
          files_ignore: |
            **/*.md
            **/*.txt
            **/*.yml
            **/*.yaml
            **/*.json
            **/Dockerfile
            **/node_modules/**
            **/dist/**
            **/build/**

      - name: Analyze PR Cognitive Complexity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          python .code-analysis/scripts/run_cognitive_analysis.py

      - name: Run AI Pre-Review Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/ai_pre_review.py

      - name: Analyze UI Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/simple_ui_analyzer.py
        continue-on-error: true

      - name: Setup Node.js for screenshots
        if: hashFiles('visual-diff-results.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install project dependencies
        if: hashFiles('visual-diff-results.json') != ''
        working-directory: sample-project
        run: npm install
        continue-on-error: true

      - name: Build project
        if: hashFiles('visual-diff-results.json') != ''
        working-directory: sample-project
        run: npm run build
        continue-on-error: true

      - name: Install Playwright
        if: hashFiles('visual-diff-results.json') != ''
        run: |
          npm install -g playwright
          playwright install chromium

      - name: Generate UI Screenshots
        if: hashFiles('visual-diff-results.json') != ''
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/generate_ui_screenshots.py
        continue-on-error: true

      - name: Upload Screenshot Artifacts
        if: hashFiles('screenshots/*.png') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots-pr-${{ github.event.pull_request.number }}
          path: screenshots/
          retention-days: 30

      - name: Update PR Labels and Assignees
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python .code-analysis/scripts/update_pr_metadata.py \
            --pr-number ${{ github.event.pull_request.number }}

      - name: Post UI Changes Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/simple-ui-pr-comment.js');
            return await script({ github, context });

      - name: Post AI Pre-Review Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/ai-pre-review-pr-comment.js');
            return await script({ github, context });

      - name: Post Cognitive Score Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/cognitive-analysis-pr-comment.js');
            return await script({ github, context });
