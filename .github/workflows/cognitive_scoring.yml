name: Cognitive Scoring & Tier Assignment

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Also allow manual trigger for debugging
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run this workflow'
        required: false
        default: 'true'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  cognitive-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install system dependencies for visual graph generation
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Run Static Analysis
        run: |
          # Run linting and complexity analysis
          pylint --load-plugins=pylint.extensions.mccabe --reports=y .code-analysis/ || true
          
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.py
            **/*.js
            **/*.ts
            **/*.jsx
            **/*.tsx
            **/*.mjs
            **/*.cjs
            **/*.vue
            **/*.svelte
            **/*.java
            **/*.cs
            **/*.go
            **/*.rs
            sample-project/**/*.js
            sample-project/**/*.ts
            sample-project/**/*.jsx
            sample-project/**/*.tsx
          files_ignore: |
            **/*.md
            **/*.txt
            **/*.yml
            **/*.yaml
            **/*.json
            **/Dockerfile
            **/node_modules/**
            **/dist/**
            **/build/**

      - name: Analyze PR Cognitive Complexity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          python .code-analysis/scripts/run_cognitive_analysis.py
          echo "AI-generated analysis for review triage"

      - name: Run AI Pre-Review Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/ai_pre_review.py
          echo "AI-generated analysis for review triage"

      - name: Generate Semantic Commit Story
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/semantic_commit_analyzer.py
          echo "AI-generated analysis for review triage"
        continue-on-error: true

      - name: Analyze UI Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/simple_ui_analyzer.py
        continue-on-error: true

      - name: Run Intent Classification Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/intent_classifier.py \
            --repo . \
            --title "${{ github.event.pull_request.title }}" \
            --description "${{ github.event.pull_request.body }}" \
            --pr-output
          echo "AI-generated analysis for review triage"
        continue-on-error: true

      - name: Run Impact Prediction Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/impact_predictor.py \
            --repo . \
            --pr-title "${{ github.event.pull_request.title }}" \
            --pr-description "${{ github.event.pull_request.body }}" \
            --pr-output
          echo "AI-generated analysis for review triage"
        continue-on-error: true

      - name: Generate Dependency Graph Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/dependency_graph_generator.py \
            --repo . \
            --before ${{ github.event.pull_request.base.sha }} \
            --after ${{ github.event.pull_request.head.sha }} \
            --pr-output
        continue-on-error: true

      - name: Setup Node.js for screenshots
        if: hashFiles('visual-diff-results.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install project dependencies
        if: hashFiles('visual-diff-results.json') != ''
        working-directory: sample-project
        run: |
          echo "Installing dependencies..."
          npm install
        continue-on-error: true

      - name: Build project
        if: hashFiles('visual-diff-results.json') != ''
        working-directory: sample-project
        run: |
          echo "Building Next.js project..."
          npm run build
        continue-on-error: true

      - name: Install Playwright
        if: hashFiles('visual-diff-results.json') != ''
        run: |
          echo "Installing Playwright..."
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Generate UI Screenshots
        if: hashFiles('visual-diff-results.json') != ''
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Generating UI screenshots..."
          python .code-analysis/scripts/generate_ui_screenshots.py
        continue-on-error: true

      - name: Upload Screenshot Artifacts
        if: hashFiles('screenshots/*.png') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots-pr-${{ github.event.pull_request.number }}
          path: screenshots/
          retention-days: 30

      - name: Update PR Labels and Assignees
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python .code-analysis/scripts/update_pr_metadata.py \
            --pr-number ${{ github.event.pull_request.number }}

      # Note: All PR comments are now posted from the build.yml workflow
      # in the correct priority order to ensure proper sequencing
