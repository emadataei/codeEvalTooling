name: Build
on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  comprehensive-analysis:
    name: Comprehensive Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install system dependencies for visual graph generation
          sudo apt-get update
          sudo apt-get install -y graphviz
      
      - name: Install Node.js dependencies for dependency analysis
        run: |
          npm install -g madge
          # Install other useful analysis tools
          npm install -g dependency-cruiser
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.py
            **/*.js
            **/*.ts
            **/*.jsx
            **/*.tsx
            **/*.mjs
            **/*.cjs
            **/*.vue
            **/*.svelte
            **/*.java
            **/*.cs
            **/*.go
            **/*.rs
            sample-project/**/*.js
            sample-project/**/*.ts
            sample-project/**/*.jsx
            sample-project/**/*.tsx
          files_ignore: |
            **/*.md
            **/*.txt
            **/*.yml
            **/*.yaml
            **/*.json
            **/Dockerfile
            **/node_modules/**
            **/dist/**
            **/build/**
      
      - name: Debug changed files
        run: |
          echo "=== Changed Files Debug ==="
          echo "All changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"
          echo "Number of changed files: ${{ steps.changed-files.outputs.all_changed_files_count }}"
          echo "Changed files (space-separated):"
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n'
          echo "=== End Debug ==="
      
      - name: Run Quality Gate Analysis
        id: quality-check
        run: |
          echo "Running Quality Gate Analysis..."
          echo "Changed files from GitHub Actions: '${{ steps.changed-files.outputs.all_changed_files }}'"
          echo "Number of changed files: ${{ steps.changed-files.outputs.all_changed_files_count }}"
          
          if [ -z "${{ steps.changed-files.outputs.all_changed_files }}" ] || [ "${{ steps.changed-files.outputs.all_changed_files_count }}" = "0" ]; then
            echo "No changed files detected by GitHub Actions. Running quality gate anyway."
          fi
          echo "Using detected changed files from GitHub Actions: ${{ steps.changed-files.outputs.all_changed_files }}"
          export CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          python .code-analysis/scripts/run_quality_gate.py
        env:
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
        continue-on-error: true
      
      - name: Add Quality Gate Summary to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/quality-gate-pr-comment.js');
            return await script({ github, context });

      - name: Upload Quality Gate Results
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-results-build
          path: quality-gate-results.json
        if: always()

      - name: Run AI Pre-Review Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/ai_pre_review.py
          echo "AI-generated analysis for review triage"
        continue-on-error: true

      - name: Analyze PR Cognitive Complexity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          python .code-analysis/scripts/run_cognitive_analysis.py
          echo "AI-generated analysis for review triage"
        continue-on-error: true

      - name: Run Intent Classification Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/intent_classifier.py \
            --repo . \
            --title "${{ github.event.pull_request.title }}" \
            --description "${{ github.event.pull_request.body }}" \
            --pr-output
          echo "AI-generated analysis for review triage"
        continue-on-error: true

      - name: Run Impact Prediction Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/impact_predictor.py \
            --repo . \
            --pr-title "${{ github.event.pull_request.title }}" \
            --pr-description "${{ github.event.pull_request.body }}" \
            --pr-output
          echo "AI-generated analysis for review triage"
        continue-on-error: true

      - name: Generate Dependency Graph Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/dependency_graph_generator.py \
            --repo . \
            --before ${{ github.event.pull_request.base.sha }} \
            --after ${{ github.event.pull_request.head.sha }} \
            --pr-output
        continue-on-error: true

      - name: Generate Semantic Commit Story
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/semantic_commit_analyzer.py
          echo "AI-generated analysis for review triage"
        continue-on-error: true

      - name: Analyze UI Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .code-analysis/scripts/simple_ui_analyzer.py
        continue-on-error: true

      # POST COMMENTS IN PRIORITY ORDER
      - name: Post AI Pre-Review Comment (1st - Priority Comment)
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/ai-pre-review-pr-comment.js');
            return await script({ github, context });

      - name: Post Quality Gate Comment (2nd - Blocking Issues)
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/quality-gate-pr-comment.js');
            return await script({ github, context });

      - name: Post UI Changes Comment (3rd)
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/simple-ui-pr-comment.js');
            return await script({ github, context });

      - name: Post Intent Classification Comment (4th)
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/intent-classification-pr-comment.js');
            return await script({ github, context });

      - name: Post Impact Prediction Comment (5th)
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/impact-prediction-pr-comment.js');
            return await script({ github, context });

      - name: Post Dependency Graph Comment (6th)
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/dependency-graph-pr-comment.js');
            return await script({ github, context });

      - name: Post Cognitive Score Comment (7th - Last)
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/cognitive-analysis-pr-comment.js');
            return await script({ github, context });

      - name: Update PR Description with Change Story
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.code-analysis/scripts/semantic-commit-pr-description.js');
            return await script({ github, context });

      # PR Visual Summary is now handled by the enhanced-pr-visuals workflow
      # which has access to generated images and enhanced analytics
      # - name: Generate and Add PR Visual Summary to Description
      #   if: always() && github.event_name == 'pull_request'
      #   uses: actions/github-script@v7
      #   with:
      #     script: |
      #       const script = require('./.code-analysis/scripts/pr-visual-summary-description.js');
      #       const changedFiles = "${{ steps.changed-files.outputs.all_changed_files }}".split(' ').filter(f => f.trim());
      #       return await script({ github, context, changedFiles });

      # - name: Post PR Visual Summary Comment (Last - Overview)
      #   if: always() && github.event_name == 'pull_request'
      #   uses: actions/github-script@v7
      #   with:
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     script: |
      #       const script = require('./.code-analysis/scripts/pr-visual-summary-comment.js');
      #       const changedFiles = "${{ steps.changed-files.outputs.all_changed_files }}".split(' ').filter(f => f.trim());
      #       return await script({ github, context, changedFiles });

      - name: Upload Visual Analysis Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visual-analysis-graphs
          path: |
            dependency_graph.png
            dependency_graph.html
            dependency_graph.txt
            impact_heatmap.png
            development_flow.png
            story_arc.gif
        if: always() && github.event_name == 'pull_request'
