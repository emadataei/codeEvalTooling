name: Build
on:
  push:
    branches:
      - master
      - main
      - eataei/worlkflowSetup
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Record metrics start
        run: |
          echo "SONAR_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
          echo "🚀 Starting SonarQube analysis at $(date)"
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        continue-on-error: true
      
      - name: Collect SonarQube metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "SonarQube" $SONAR_START_TIME || {
            echo "⚠️ Failed to collect SonarQube metrics, creating fallback entry"
            echo "{\"timestamp\":\"$(date -Iseconds)\",\"tool\":\"SonarQube\",\"duration_seconds\":$(($(date +%s) - $SONAR_START_TIME)),\"status\":\"failed\"}" >> performance-metrics.jsonl
          }
          echo "📊 SonarQube metrics collected"
        if: always()
      
      - name: Upload SonarQube metrics
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-metrics
          path: |
            performance-metrics.jsonl
            metrics/sonarqube-metrics.json
        if: always()

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "CODEQL_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
          echo "🚀 Starting CodeQL analysis for ${{ matrix.language }} at $(date)"
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
      
      - name: Collect CodeQL metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "CodeQL-${{ matrix.language }}" $CODEQL_START_TIME || {
            echo "⚠️ Failed to collect CodeQL metrics, creating fallback entry"
            echo "{\"timestamp\":\"$(date -Iseconds)\",\"tool\":\"CodeQL-${{ matrix.language }}\",\"duration_seconds\":$(($(date +%s) - $CODEQL_START_TIME)),\"status\":\"failed\"}" >> performance-metrics.jsonl
          }
          echo "📊 CodeQL-${{ matrix.language }} metrics collected"
        if: always()
      
      - name: Upload CodeQL metrics
        uses: actions/upload-artifact@v4
        with:
          name: codeql-metrics-${{ matrix.language }}
          path: |
            performance-metrics.jsonl
            metrics/codeql-${{ matrix.language }}-metrics.json
        if: always()

  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "SEMGREP_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
      
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/python
            p/react
            p/typescript
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true
      
      - name: Generate Semgrep JSON output for metrics
        run: |
          semgrep --config=auto --json --output=semgrep-results.json . || true
        continue-on-error: true
      
      - name: Collect Semgrep metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "Semgrep" $SEMGREP_START_TIME || {
            echo "⚠️ Failed to collect Semgrep metrics, creating fallback entry"
            echo "{\"timestamp\":\"$(date -Iseconds)\",\"tool\":\"Semgrep\",\"duration_seconds\":$(($(date +%s) - $SEMGREP_START_TIME)),\"status\":\"failed\"}" >> performance-metrics.jsonl
          }
          echo "📊 Semgrep metrics collected"
        if: always()
      
      - name: Upload Semgrep metrics
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-metrics
          path: |
            performance-metrics.jsonl
            metrics/semgrep-metrics.json
        if: always()

  snyk:
    name: Snyk Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "SNYK_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
          echo "🚀 Starting Snyk analysis at $(date)"
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Snyk CLI
        run: npm install -g snyk
      
      - name: Authenticate Snyk
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            snyk auth ${{ secrets.SNYK_TOKEN }}
            echo "✅ Snyk authentication successful"
          else
            echo "⚠️ No SNYK_TOKEN provided, skipping authentication"
          fi
      
      - name: Test Python dependencies
        run: |
          cd backend
          # Check if pyproject.toml exists and is valid
          if [ -f "pyproject.toml" ]; then
            echo "Found pyproject.toml, attempting Snyk test..."
            snyk test --file=pyproject.toml --package-manager=pip --severity-threshold=high || {
              echo "pyproject.toml failed, trying requirements.txt approach..."
              # If pyproject.toml fails, try to generate requirements.txt
              if command -v pip >/dev/null 2>&1; then
                pip install --dry-run . 2>/dev/null | grep "Would install" | cut -d' ' -f3 > temp-requirements.txt || true
                if [ -s temp-requirements.txt ]; then
                  snyk test --file=temp-requirements.txt --severity-threshold=high || true
                fi
              fi
            }
          else
            echo "No pyproject.toml found, skipping Python dependency test"
          fi
        continue-on-error: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node.js dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Test Node.js dependencies
        run: |
          cd frontend
          snyk test --file=package.json --severity-threshold=high
        continue-on-error: true
      
      - name: Run Snyk Code analysis with detailed output
        run: |
          snyk code test --sarif-file-output=snyk-code-results.sarif || true
          snyk code test --json-file-output=snyk-code-results.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
      
      - name: Collect Snyk metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "Snyk" $SNYK_START_TIME || {
            echo "⚠️ Failed to collect Snyk metrics, creating fallback entry"
            echo "{\"timestamp\":\"$(date -Iseconds)\",\"tool\":\"Snyk\",\"duration_seconds\":$(($(date +%s) - $SNYK_START_TIME)),\"status\":\"failed\"}" >> performance-metrics.jsonl
          }
          echo "📊 Snyk metrics collected"
        if: always()
      
      - name: Upload Snyk metrics
        uses: actions/upload-artifact@v4
        with:
          name: snyk-metrics
          path: |
            performance-metrics.jsonl
            metrics/snyk-metrics.json
        if: always()
      
      - name: Upload Snyk results
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk-code-results.json
        if: always()

  metrics-aggregation:
    name: Aggregate Performance Metrics
    runs-on: ubuntu-latest
    needs: [sonarqube, codeql, semgrep, snyk]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-metrics*"
          merge-multiple: true
      
      - name: Debug - Show downloaded metrics
        run: |
          echo "=== Downloaded files ==="
          ls -la
          echo "=== Metrics directory ==="
          ls -la metrics/ 2>/dev/null || echo "No metrics directory"
          echo "=== Performance metrics file ==="
          if [ -f performance-metrics.jsonl ]; then
            echo "📄 performance-metrics.jsonl exists, content:"
            cat performance-metrics.jsonl | head -20
            echo "📊 Total lines in metrics file: $(wc -l < performance-metrics.jsonl)"
          else
            echo "❌ No performance-metrics.jsonl file found"
            echo "Creating minimal metrics file for demonstration..."
            echo "{\"timestamp\":\"$(date -Iseconds)\",\"tool\":\"Demo\",\"duration_seconds\":1,\"status\":\"completed\"}" > performance-metrics.jsonl
          fi
      
      - name: Merge metrics files (if multiple)
        run: |
          echo "🔄 Merging metrics files..."
          
          # Create a combined metrics file
          if [ -f performance-metrics.jsonl ]; then
            echo "📄 Found main performance-metrics.jsonl"
            cp performance-metrics.jsonl combined-metrics.jsonl
          else
            echo "� Creating new combined metrics file"
            touch combined-metrics.jsonl
          fi
          
          # Look for other metrics files and merge them
          for metrics_file in metrics/*-metrics.json; do
            if [ -f "$metrics_file" ]; then
              echo "📄 Processing $metrics_file"
              cat "$metrics_file" >> combined-metrics.jsonl
            fi
          done
          
          # Replace the main file with combined
          mv combined-metrics.jsonl performance-metrics.jsonl
          
          echo "✅ Final metrics file contains $(wc -l < performance-metrics.jsonl || echo '0') entries"
      
      - name: Generate performance report
        run: |
          echo "🔄 Generating performance report..."
          
          # Ensure we have at least some metrics to work with
          if [ ! -s performance-metrics.jsonl ]; then
            echo "⚠️ No metrics found, creating sample entries for demonstration..."
            cat > performance-metrics.jsonl << 'ENDOFFILE'
          {"tool":"SonarQube","timestamp":"2025-07-11T21:00:00Z","duration_seconds":0,"status":"no_data"}
          {"tool":"CodeQL","timestamp":"2025-07-11T21:00:00Z","duration_seconds":0,"status":"no_data"}
          {"tool":"Semgrep","timestamp":"2025-07-11T21:00:00Z","duration_seconds":0,"status":"no_data"}
          {"tool":"Snyk","timestamp":"2025-07-11T21:00:00Z","duration_seconds":0,"status":"no_data"}
          ENDOFFILE
          fi
          
          # Generate the reports
          python scripts/generate-performance-report.py
          python scripts/generate-markdown-report.py
      
      - name: Add report to job summary
        run: |
          echo "## 🔒 Security Analysis Performance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f performance-metrics.jsonl ]; then
            echo "### 📊 Analysis Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Tool | Duration | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|------|----------|--------|" >> $GITHUB_STEP_SUMMARY
            
            # Simple parsing without complex Python
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                tool=$(echo "$line" | grep -o '"tool":"[^"]*"' | cut -d'"' -f4)
                duration=$(echo "$line" | grep -o '"duration_seconds":[0-9]*' | cut -d':' -f2)
                if [ -n "$tool" ] && [ -n "$duration" ]; then
                  if [ "$duration" -lt 30 ]; then
                    status="🚀 Fast"
                  elif [ "$duration" -lt 60 ]; then
                    status="⚡ Normal"
                  else
                    status="🐌 Slow"
                  fi
                  echo "| $tool | ${duration}s | $status |" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            done < performance-metrics.jsonl
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📍 Access Options" >> $GITHUB_STEP_SUMMARY
            echo "- Download 'performance-metrics-report' artifact for full HTML report" >> $GITHUB_STEP_SUMMARY
            echo "- Check repository Security tab for detailed findings" >> $GITHUB_STEP_SUMMARY
            echo "- View at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/performance-report.html" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No performance metrics found. Check individual job logs for issues." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Show generated files
        run: |
          echo "=== Generated files ==="
          ls -la *.html *.json* metrics/ 2>/dev/null || true
      
      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics-report
          path: |
            metrics/
            performance-report.html
            performance-metrics.jsonl
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: reports/${{ github.run_number }}
          keep_files: true
          publish_branch: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create performance report index
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          mkdir -p gh-pages-temp
          cat > gh-pages-temp/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Security Analysis Performance Reports</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; }
              .report-link { display: block; padding: 10px; margin: 5px 0; background: #f0f0f0; text-decoration: none; border-radius: 5px; }
              .report-link:hover { background: #e0e0e0; }
            </style>
          </head>
          <body>
            <h1>🔒 Security Analysis Performance Reports</h1>
            <p>Latest reports from automated security analysis:</p>
            <a href="reports/${{ github.run_number }}/performance-report.html" class="report-link">
              📊 Latest Report (Run #${{ github.run_number }}) - $(date)
            </a>
            <p><em>Historical reports available in the reports/ directory</em></p>
          </body>
          </html>
          EOF
      
      - name: Deploy index to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-temp
          keep_files: true
          publish_branch: gh-pages
      
      - name: Check for performance regression
        run: |
          chmod +x ./scripts/check-performance-regression.py
          python scripts/check-performance-regression.py \
            --current-metrics performance-metrics.jsonl \
            --threshold 25
        continue-on-error: true