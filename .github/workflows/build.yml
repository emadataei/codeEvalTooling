name: Build
on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality-gate:
    name: Quality Gate Analysis
    runs-on: ubuntu-latest
    outputs:
      quality-passed: ${{ steps.quality-check.outputs.passed }}
      quality-score: ${{ steps.quality-check.outputs.score }}
      quality-penalty: ${{ steps.quality-check.outputs.penalty }}
      blocking-issues: ${{ steps.quality-check.outputs.blocking_issues }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.py
            **/*.js
            **/*.ts
            **/*.jsx
            **/*.tsx
            **/*.java
            **/*.cs
            **/*.go
            **/*.rs
          files_ignore: |
            **/*.md
            **/*.txt
            **/*.yml
            **/*.yaml
            **/*.json
            **/Dockerfile
      
      - name: Run Quality Gate Analysis
        id: quality-check
        run: |
          echo "Running Quality Gate Analysis..."
          python scripts/run_quality_gate.py
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
      
      - name: Add Quality Gate Summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let results = { passed: false, score: 0, summary: 'Failed to load results' };
            try {
              results = JSON.parse(fs.readFileSync('quality-gate-results.json', 'utf8'));
            } catch (error) {
              console.log('Could not read quality gate results:', error);
            }
            
            const passed = results.passed;
            const score = results.score;
            const icon = passed ? 'PASS' : 'FAIL';
            const status = passed ? 'PASSED' : 'FAILED';
            
            let comment = `## ${icon} Quality Gate ${status}\n\n`;
            comment += `**Score:** ${score}/100\n`;
            comment += `**Summary:** ${results.summary}\n\n`;
            
            if (results.issues && results.issues.blocking && results.issues.blocking.length > 0) {
              comment += `### BLOCKING Issues (Must Fix)\n\n`;
              results.issues.blocking.forEach(issue => {
                comment += `- **${issue.category}**: ${issue.message}\n`;
                if (issue.file !== 'PR') {
                  comment += `  - Location: \`${issue.file}:${issue.line}\`\n`;
                }
                if (issue.suggestion) {
                  comment += `  - Suggestion: ${issue.suggestion}\n`;
                }
                comment += '\n';
              });
            }
            
            if (results.issues && results.issues.warning && results.issues.warning.length > 0) {
              comment += `### Warnings\n\n`;
              results.issues.warning.slice(0, 5).forEach(issue => {
                comment += `- **${issue.category}**: ${issue.message}\n`;
                if (issue.file !== 'PR') {
                  comment += `  - Location: \`${issue.file}:${issue.line}\`\n`;
                }
                comment += '\n';
              });
              if (results.issues.warning.length > 5) {
                comment += `... and ${results.issues.warning.length - 5} more warnings\n\n`;
              }
            }
            
            if (passed) {
              comment += `\n**Ready for Cognitive Analysis** - Proceeding to next review stage.\n`;
            } else {
              comment += `\n**Cognitive Analysis Blocked** - Fix blocking issues before proceeding.\n`;
            }
            
            // Find existing quality gate comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.find(comment => 
              comment.body.includes('Quality Gate')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
      
      - name: Upload Quality Gate Results
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-results
          path: quality-gate-results.json
        if: always()

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: quality-gate
    # Continue even if quality gate has warnings, but not if it fails completely
    if: always() && (needs.quality-gate.outputs.quality-passed == 'true' || needs.quality-gate.outputs.blocking-issues == '0')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Record metrics start
        run: |
          echo "SONAR_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
          echo "🚀 Starting SonarQube analysis at $(date)"
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        continue-on-error: true
      
      - name: Collect SonarQube metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "SonarQube" $SONAR_START_TIME || {
            echo "⚠️ Failed to collect SonarQube metrics, creating fallback entry"
            echo "{\"timestamp\":\"$(date -Iseconds)\",\"tool\":\"SonarQube\",\"duration_seconds\":$(($(date +%s) - $SONAR_START_TIME)),\"status\":\"failed\"}" >> performance-metrics.jsonl
          }
          echo "📊 SonarQube metrics collected"
        if: always()
      
      - name: Upload SonarQube metrics
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-metrics
          path: |
            performance-metrics.jsonl
            metrics/sonarqube-metrics.json
        if: always()

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: quality-gate
    # Continue even if quality gate has warnings, but not if it fails completely
    if: always() && (needs.quality-gate.outputs.quality-passed == 'true' || needs.quality-gate.outputs.blocking-issues == '0')
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "CODEQL_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
          echo "🚀 Starting CodeQL analysis for ${{ matrix.language }} at $(date)"
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
      
      - name: Collect CodeQL metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "CodeQL-${{ matrix.language }}" $CODEQL_START_TIME || {
            echo "⚠️ Failed to collect CodeQL metrics, creating fallback entry"
            echo "{\"timestamp\":\"$(date -Iseconds)\",\"tool\":\"CodeQL-${{ matrix.language }}\",\"duration_seconds\":$(($(date +%s) - $CODEQL_START_TIME)),\"status\":\"failed\"}" >> performance-metrics.jsonl
          }
          echo "📊 CodeQL-${{ matrix.language }} metrics collected"
        if: always()
      
      - name: Upload CodeQL metrics
        uses: actions/upload-artifact@v4
        with:
          name: codeql-metrics-${{ matrix.language }}
          path: |
            performance-metrics.jsonl
            metrics/codeql-${{ matrix.language }}-metrics.json
        if: always()

  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    needs: quality-gate
    # Continue even if quality gate has warnings, but not if it fails completely  
    if: always() && (needs.quality-gate.outputs.quality-passed == 'true' || needs.quality-gate.outputs.blocking-issues == '0')
    steps:
      - uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "SEMGREP_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
      
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/python
            p/react
            p/typescript
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true
      
      - name: Generate Semgrep JSON output for metrics
        run: |
          semgrep --config=auto --json --output=semgrep-results.json . || true
        continue-on-error: true
      
      - name: Collect Semgrep metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "Semgrep" $SEMGREP_START_TIME || {
            echo "⚠️ Failed to collect Semgrep metrics, creating fallback entry"
            echo "{\"timestamp\":\"$(date -Iseconds)\",\"tool\":\"Semgrep\",\"duration_seconds\":$(($(date +%s) - $SEMGREP_START_TIME)),\"status\":\"failed\"}" >> performance-metrics.jsonl
          }
          echo "📊 Semgrep metrics collected"
        if: always()
      
      - name: Upload Semgrep metrics
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-metrics
          path: |
            performance-metrics.jsonl
            metrics/semgrep-metrics.json
            semgrep-results.json
        if: always()

  snyk:
    name: Snyk Security Analysis
    runs-on: ubuntu-latest
    needs: quality-gate
    # Continue even if quality gate has warnings, but not if it fails completely
    if: always() && (needs.quality-gate.outputs.quality-passed == 'true' || needs.quality-gate.outputs.blocking-issues == '0')
    steps:
      - uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "SNYK_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
          echo "🚀 Starting Snyk analysis at $(date)"
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Snyk CLI
        run: npm install -g snyk
      
      - name: Authenticate Snyk
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "🔐 Authenticating with Snyk..."
            snyk auth ${{ secrets.SNYK_TOKEN }}
            echo "✅ Snyk authentication successful"
            
            # Test Snyk CLI is working
            echo "🧪 Testing Snyk CLI..."
            snyk --version || echo "⚠️ Snyk version check failed"
          else
            echo "⚠️ No SNYK_TOKEN provided, skipping authentication"
            echo "Some Snyk features may not work without authentication"
          fi
      
      - name: Test Python dependencies
        timeout-minutes: 5
        continue-on-error: true
        run: |
          cd backend
          if [ -f "pyproject.toml" ]; then
            echo "Found pyproject.toml, attempting Snyk test with timeout..."
            
            # Try with a short timeout to avoid hanging
            if timeout 120s snyk test --file=pyproject.toml --package-manager=pip --severity-threshold=high 2>&1; then
              echo "✅ Snyk test completed successfully"
            else
              echo "⚠️ Snyk test failed or timed out - this is expected due to parsing issues"
              echo "Continuing with code analysis instead of dependency scanning"
            fi
          else
            echo "No pyproject.toml found, skipping Python dependency test"
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node.js dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Test Node.js dependencies
        timeout-minutes: 3
        continue-on-error: true
        run: |
          cd frontend
          echo "Testing Node.js dependencies with timeout..."
          timeout 180s snyk test --file=package.json --severity-threshold=high 2>&1 || {
            echo "⚠️ Node.js dependency test failed or timed out"
          }
      
      - name: Run Snyk Code analysis with detailed output
        timeout-minutes: 10
        continue-on-error: true
        run: |
          echo "Running Snyk Code analysis with timeout..."
          timeout 600s snyk code test --sarif-file-output=snyk-code-results.sarif 2>&1 || echo "SARIF generation failed/timed out"
          timeout 300s snyk code test --json-file-output=snyk-code-results.json 2>&1 || echo "JSON generation failed/timed out"
          echo "Snyk Code analysis completed (with potential timeouts)"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      
      - name: Collect Snyk metrics
        run: |
          echo "📊 Collecting Snyk metrics..."
          chmod +x ./scripts/collect-metrics.sh
          
          # Always try to collect metrics, even if previous steps failed
          ./scripts/collect-metrics.sh "Snyk" $SNYK_START_TIME 2>&1 || {
            echo "⚠️ Failed to collect Snyk metrics via script, creating manual fallback entry"
            duration=$(($(date +%s) - $SNYK_START_TIME))
            echo "{\"timestamp\":\"$(date -Iseconds)\",\"tool\":\"Snyk\",\"duration_seconds\":$duration,\"status\":\"failed_metrics_collection\"}" >> performance-metrics.jsonl
            echo "📝 Manual fallback metrics entry created"
          }
          
          echo "✅ Snyk metrics collection completed"
        if: always()
      
      - name: Upload Snyk metrics
        uses: actions/upload-artifact@v4
        with:
          name: snyk-metrics
          path: |
            performance-metrics.jsonl
            metrics/snyk-metrics.json
            snyk-code-results.json
        if: always()
      
      - name: Upload Snyk results
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk-code-results.json
        if: always()

  cognitive-scoring:
    name: Cognitive Complexity Analysis
    runs-on: ubuntu-latest
    needs: quality-gate
    if: needs.quality-gate.outputs.quality-passed == 'true'
    outputs:
      tier: ${{ steps.cognitive-analysis.outputs.tier }}
      total-score: ${{ steps.cognitive-analysis.outputs.total_score }}
      reasoning: ${{ steps.cognitive-analysis.outputs.reasoning }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download Quality Gate Results
        uses: actions/download-artifact@v4
        with:
          name: quality-gate-results
      
      - name: Get changed files for cognitive analysis
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.py
            **/*.js
            **/*.ts
            **/*.jsx
            **/*.tsx
            **/*.java
            **/*.cs
            **/*.go
            **/*.rs
      
      - name: Run Cognitive Analysis
        id: cognitive-analysis
        run: |
          echo "Running Cognitive Complexity Analysis..."
          python scripts/run_cognitive_analysis.py
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          AI_FOUNDRY_ENDPOINT: ${{ secrets.AI_FOUNDRY_ENDPOINT }}
          AI_FOUNDRY_TOKEN: ${{ secrets.AI_FOUNDRY_TOKEN }}
          AI_FOUNDRY_MODEL: ${{ secrets.AI_FOUNDRY_MODEL }}
      
      - name: Add Cognitive Analysis Summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let results = { tier: 0, total_score: 0, reasoning: 'Failed to load results' };
            try {
              results = JSON.parse(fs.readFileSync('cognitive-analysis-results.json', 'utf8'));
            } catch (error) {
              console.log('Could not read cognitive analysis results:', error);
            }
            
            const tier = results.tier;
            const score = results.total_score;
            
            // Determine tier details
            const tierInfo = {
              0: { icon: 'TIER0', name: 'Tier 0', action: 'Auto-mergeable', color: 'green' },
              1: { icon: 'TIER1', name: 'Tier 1', action: 'Light Review Required', color: 'yellow' },
              2: { icon: 'TIER2', name: 'Tier 2', action: 'Deep Review Required', color: 'red' }
            };
            
            const info = tierInfo[tier] || tierInfo[2];
            
            let comment = `## Cognitive Complexity Analysis\n\n`;
            comment += `### ${info.icon} ${info.name} - ${info.action}\n\n`;
            comment += `**Total Score:** ${score} points\n`;
            comment += `**Reasoning:** ${results.reasoning}\n\n`;
            
            if (results.static_score !== undefined) {
              comment += `### Score Breakdown\n`;
              comment += `- **Static Analysis:** ${results.static_score}/40 points\n`;
              comment += `- **Impact Surface:** ${results.impact_score}/30 points\n`;
              comment += `- **AI Complexity:** ${results.ai_score}/30 points\n`;
              if (results.quality_penalty > 0) {
                comment += `- **Quality Penalty:** +${results.quality_penalty} points\n`;
              }
              comment += '\n';
            }
            
            comment += `### Review Guidelines\n`;
            if (tier === 0) {
              comment += `- **Auto-merge eligible** (if all checks pass)\n`;
              comment += `- No human review required\n`;
              comment += `- Low complexity change\n`;
            } else if (tier === 1) {
              comment += `- **Single reviewer** required\n`;
              comment += `- **12-hour SLA** for review\n`;
              comment += `- Standard review process\n`;
            } else {
              comment += `- **Domain expert review** required\n`;
              comment += `- **48-hour SLA** for review\n`;
              comment += `- High complexity - careful review needed\n`;
            }
            
            // Find existing cognitive analysis comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.find(comment => 
              comment.body.includes('Cognitive Complexity Analysis')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
            
            // Set PR labels based on tier
            const labels = [`tier-${tier}`];
            if (tier === 0) labels.push('auto-merge-candidate');
            if (tier === 2) labels.push('needs-expert-review');
            
            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
      
      - name: Upload Cognitive Analysis Results
        uses: actions/upload-artifact@v4
        with:
          name: cognitive-analysis-results
          path: cognitive-analysis-results.json
        if: always()

  metrics-aggregation:
    name: Aggregate Performance Metrics
    runs-on: ubuntu-latest
    needs: [quality-gate, cognitive-scoring, sonarqube, codeql, semgrep, snyk]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-metrics* | *-results"
          merge-multiple: true
      
      - name: Debug - Show downloaded metrics
        run: |
          echo "=== Downloaded files ==="
          ls -la
          echo "=== Metrics directory ==="
          ls -la metrics/ 2>/dev/null || echo "No metrics directory"
          echo "=== Performance metrics file ==="
          if [ -f performance-metrics.jsonl ] && [ -s performance-metrics.jsonl ]; then
            echo "📄 performance-metrics.jsonl exists, content:"
            cat performance-metrics.jsonl | head -20
            echo "📊 Total lines in metrics file: $(wc -l < performance-metrics.jsonl)"
          else
            echo "❌ No performance-metrics.jsonl file found or file is empty"
            echo "Creating minimal metrics file for demonstration..."
            echo '{"timestamp":"'$(date -Iseconds)'","tool":"Demo","duration_seconds":1,"status":"no_data","security_findings":{"total_vulnerabilities":0,"high_severity":0,"medium_severity":0,"low_severity":0,"top_issues":"No data collected"}}' > performance-metrics.jsonl
          fi
      
      - name: Merge metrics files (if multiple)
        run: |
          echo "🔄 Merging metrics files..."
          
          # Create a combined metrics file
          if [ -f performance-metrics.jsonl ]; then
            echo "📄 Found main performance-metrics.jsonl"
            cp performance-metrics.jsonl combined-metrics.jsonl
          else
            echo "� Creating new combined metrics file"
            touch combined-metrics.jsonl
          fi
          
          # Look for other metrics files and merge them
          for metrics_file in metrics/*-metrics.json; do
            if [ -f "$metrics_file" ]; then
              echo "📄 Processing $metrics_file"
              cat "$metrics_file" >> combined-metrics.jsonl
            fi
          done
          
          # Replace the main file with combined
          mv combined-metrics.jsonl performance-metrics.jsonl
          
          echo "✅ Final metrics file contains $(wc -l < performance-metrics.jsonl || echo '0') entries"
      
      - name: Generate performance report
        run: |
          echo "🔄 Generating performance report..."
          
          # Ensure we have at least some metrics to work with
          if [ ! -s performance-metrics.jsonl ]; then
            echo "⚠️ No metrics found, creating sample entries for demonstration..."
            cat > performance-metrics.jsonl << 'ENDOFFILE'
          {"tool":"SonarQube","timestamp":"2025-07-11T21:00:00Z","duration_seconds":0,"status":"no_data"}
          {"tool":"CodeQL","timestamp":"2025-07-11T21:00:00Z","duration_seconds":0,"status":"no_data"}
          {"tool":"Semgrep","timestamp":"2025-07-11T21:00:00Z","duration_seconds":0,"status":"no_data"}
          {"tool":"Snyk","timestamp":"2025-07-11T21:00:00Z","duration_seconds":0,"status":"no_data"}
          ENDOFFILE
          fi
          
          # Generate the reports
          python scripts/generate-performance-report.py
          python scripts/generate-markdown-report.py
      
      - name: Add report to job summary
        run: |
          echo "## 🔒 Security Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Add Quality Gate Summary
          if [ -f quality-gate-results.json ]; then
            echo "### Quality Gate Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            quality_passed=$(cat quality-gate-results.json | grep -o '"passed":[^,}]*' | cut -d':' -f2 | tr -d '"' || echo "unknown")
            quality_score=$(cat quality-gate-results.json | grep -o '"score":[^,}]*' | cut -d':' -f2 | tr -d '"' || echo "unknown")
            blocking_issues=$(cat quality-gate-results.json | grep -o '"blocking_issues":[^,}]*' | cut -d':' -f2 | tr -d '"' || echo "0")
            
            if [ "$quality_passed" = "true" ]; then
              echo "| Status | Score | Blocking Issues |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|-----------------|" >> $GITHUB_STEP_SUMMARY
              echo "| PASSED | $quality_score/100 | $blocking_issues |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Status | Score | Blocking Issues |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|-----------------|" >> $GITHUB_STEP_SUMMARY
              echo "| FAILED | $quality_score/100 | $blocking_issues |" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add Cognitive Analysis Summary
          if [ -f cognitive-analysis-results.json ]; then
            echo "### Cognitive Complexity Analysis" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            tier=$(cat cognitive-analysis-results.json | grep -o '"tier":[^,}]*' | cut -d':' -f2 | tr -d '"' || echo "unknown")
            total_score=$(cat cognitive-analysis-results.json | grep -o '"total_score":[^,}]*' | cut -d':' -f2 | tr -d '"' || echo "unknown")
            
            case $tier in
              0) tier_info="Tier 0 (Auto-mergeable)" ;;
              1) tier_info="Tier 1 (Light Review)" ;;
              2) tier_info="Tier 2 (Deep Review)" ;;
              *) tier_info="Unknown Tier" ;;
            esac
            
            echo "| Tier | Total Score | Review Requirement |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------------|-------------------|" >> $GITHUB_STEP_SUMMARY
            echo "| $tier_info | $total_score points | See PR comments |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f performance-metrics.jsonl ]; then
            echo "### 🔒 Security Findings" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Tool | Vulnerabilities | High | Medium | Low |" >> $GITHUB_STEP_SUMMARY
            echo "|------|----------------|------|--------|-----|" >> $GITHUB_STEP_SUMMARY
            
            # Parse security findings from JSON
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                tool=$(echo "$line" | grep -o '"tool":"[^"]*"' | cut -d'"' -f4)
                total_vulns=$(echo "$line" | grep -o '"total_vulnerabilities":[^,}]*' | cut -d':' -f2 | tr -d '"' || echo "N/A")
                high_vulns=$(echo "$line" | grep -o '"high_severity":[^,}]*' | cut -d':' -f2 | tr -d '"' || echo "N/A")
                med_vulns=$(echo "$line" | grep -o '"medium_severity":[^,}]*' | cut -d':' -f2 | tr -d '"' || echo "N/A")
                low_vulns=$(echo "$line" | grep -o '"low_severity":[^,}]*' | cut -d':' -f2 | tr -d '"' || echo "N/A")
                
                if [ -n "$tool" ]; then
                  # Handle special values
                  if [ "$total_vulns" = "github_stored" ]; then
                    total_vulns="[GitHub Security](../../security/code-scanning)"
                    high_vulns="-"; med_vulns="-"; low_vulns="-"
                  elif [ "$total_vulns" = "sonarcloud_stored" ]; then
                    total_vulns="[SonarCloud](https://sonarcloud.io)"
                    high_vulns="-"; med_vulns="-"; low_vulns="-"
                  fi
                  
                  echo "| $tool | $total_vulns | $high_vulns | $med_vulns | $low_vulns |" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            done < performance-metrics.jsonl
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⚡ Performance Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Tool | Duration | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|------|----------|--------|" >> $GITHUB_STEP_SUMMARY
            
            # Simple parsing for performance
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                tool=$(echo "$line" | grep -o '"tool":"[^"]*"' | cut -d'"' -f4)
                duration=$(echo "$line" | grep -o '"duration_seconds":[0-9]*' | cut -d':' -f2)
                if [ -n "$tool" ] && [ -n "$duration" ]; then
                  if [ "$duration" -lt 30 ]; then
                    status="🚀 Fast"
                  elif [ "$duration" -lt 60 ]; then
                    status="⚡ Normal"
                  else
                    status="🐌 Slow"
                  fi
                  echo "| $tool | ${duration}s | $status |" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            done < performance-metrics.jsonl
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📍 Access Options" >> $GITHUB_STEP_SUMMARY
            echo "- Download 'performance-metrics-report' artifact for full HTML report with interactive tabs" >> $GITHUB_STEP_SUMMARY
            echo "- Check repository Security tab for detailed CodeQL findings" >> $GITHUB_STEP_SUMMARY
            echo "- View at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/performance-report.html" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No metrics found. Check individual job logs for issues." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Show generated files
        run: |
          echo "=== Generated files ==="
          ls -la *.html *.json* metrics/ 2>/dev/null || true
      
      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics-report
          path: |
            metrics/
            performance-report.html
            performance-metrics.jsonl
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: reports/${{ github.run_number }}
          keep_files: true
          publish_branch: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create performance report index
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          mkdir -p gh-pages-temp
          cat > gh-pages-temp/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Security Analysis Performance Reports</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; }
              .report-link { display: block; padding: 10px; margin: 5px 0; background: #f0f0f0; text-decoration: none; border-radius: 5px; }
              .report-link:hover { background: #e0e0e0; }
            </style>
          </head>
          <body>
            <h1>🔒 Security Analysis Performance Reports</h1>
            <p>Latest reports from automated security analysis:</p>
            <a href="reports/${{ github.run_number }}/performance-report.html" class="report-link">
              📊 Latest Report (Run #${{ github.run_number }}) - $(date)
            </a>
            <p><em>Historical reports available in the reports/ directory</em></p>
          </body>
          </html>
          EOF
      
      - name: Deploy index to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-temp
          keep_files: true
          publish_branch: gh-pages
      
      - name: Check for performance regression
        run: |
          chmod +x ./scripts/check-performance-regression.py
          python scripts/check-performance-regression.py \
            --current-metrics performance-metrics.jsonl \
            --threshold 25
        continue-on-error: true