name: Build
on:
  push:
    branches:
      - Master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Record metrics start
        run: |
          echo "SONAR_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      
      - name: Collect SonarQube metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "SonarQube" $SONAR_START_TIME
        if: always()
      
      - name: Upload SonarQube metrics
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-metrics
          path: |
            performance-metrics.jsonl
            metrics/
        if: always()

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "CODEQL_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
      
      - name: Collect CodeQL metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "CodeQL-${{ matrix.language }}" $CODEQL_START_TIME
        if: always()
      
      - name: Upload CodeQL metrics
        uses: actions/upload-artifact@v4
        with:
          name: codeql-metrics-${{ matrix.language }}
          path: |
            performance-metrics.jsonl
            metrics/
        if: always()

  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "SEMGREP_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
      
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/python
            p/react
            p/typescript
      
      - name: Collect Semgrep metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "Semgrep" $SEMGREP_START_TIME
        if: always()
      
      - name: Upload Semgrep metrics
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-metrics
          path: |
            performance-metrics.jsonl
            metrics/
        if: always()

  snyk:
    name: Snyk Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "SNYK_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Snyk CLI
        run: npm install -g snyk
      
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
      
      - name: Test Python dependencies
        run: |
          cd backend
          snyk test --file=pyproject.toml --package-manager=pip --severity-threshold=high
        continue-on-error: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node.js dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Test Node.js dependencies
        run: |
          cd frontend
          snyk test --file=package.json --severity-threshold=high
        continue-on-error: true
      
      - name: Run Snyk Code analysis
        run: snyk code test --json-file-output=snyk-code-results.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
      
      - name: Collect Snyk metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "Snyk" $SNYK_START_TIME
        if: always()
      
      - name: Upload Snyk metrics
        uses: actions/upload-artifact@v4
        with:
          name: snyk-metrics
          path: |
            performance-metrics.jsonl
            metrics/
        if: always()
      
      - name: Upload Snyk results
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk-code-results.json
        if: always()

  metrics-aggregation:
    name: Aggregate Performance Metrics
    runs-on: ubuntu-latest
    needs: [sonarqube, codeql, semgrep, snyk]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-metrics*"
          merge-multiple: true
      
      - name: Debug - List downloaded files
        run: |
          echo "=== Current directory contents ==="
          ls -la
          echo "=== Metrics directory contents ==="
          ls -la metrics/ || echo "No metrics directory"
          echo "=== Performance metrics file ==="
          cat performance-metrics.jsonl || echo "No performance-metrics.jsonl file"
      
      - name: Generate performance report
        run: |
          python scripts/generate-performance-report.py
      
      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics-report
          path: |
            metrics/
            performance-report.html
            performance-metrics.jsonl
      
      - name: Check for performance regression
        run: |
          chmod +x ./scripts/check-performance-regression.py
          python scripts/check-performance-regression.py \
            --current-metrics performance-metrics.jsonl \
            --threshold 25
        continue-on-error: true