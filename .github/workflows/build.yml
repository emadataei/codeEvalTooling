name: Build
on:
  push:
    branches:
      - master
      - main
      - eataei/worlkflowSetup
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Record metrics start
        run: |
          echo "SONAR_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
          echo "🚀 Starting SonarQube analysis at $(date)"
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        continue-on-error: true
      
      - name: Collect SonarQube metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "SonarQube" $SONAR_START_TIME
          echo "📊 SonarQube metrics collected"
        if: always()
      
      - name: Upload SonarQube metrics
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-metrics
          path: |
            performance-metrics.jsonl
            metrics/sonarqube-metrics.json
        if: always()

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "CODEQL_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
          echo "🚀 Starting CodeQL analysis for ${{ matrix.language }} at $(date)"
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
      
      - name: Collect CodeQL metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "CodeQL-${{ matrix.language }}" $CODEQL_START_TIME
          echo "📊 CodeQL-${{ matrix.language }} metrics collected"
        if: always()
      
      - name: Upload CodeQL metrics
        uses: actions/upload-artifact@v4
        with:
          name: codeql-metrics-${{ matrix.language }}
          path: |
            performance-metrics.jsonl
            metrics/codeql-${{ matrix.language }}-metrics.json
        if: always()

  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "SEMGREP_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
      
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/python
            p/react
            p/typescript
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true
      
      - name: Generate Semgrep JSON output for metrics
        run: |
          semgrep --config=auto --json --output=semgrep-results.json . || true
        continue-on-error: true
      
      - name: Collect Semgrep metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "Semgrep" $SEMGREP_START_TIME
          echo "📊 Semgrep metrics collected"
        if: always()
      
      - name: Upload Semgrep metrics
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-metrics
          path: |
            performance-metrics.jsonl
            metrics/semgrep-metrics.json
        if: always()

  snyk:
    name: Snyk Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Record metrics start
        run: |
          echo "SNYK_START_TIME=$(date +%s)" >> $GITHUB_ENV
          mkdir -p metrics
          echo "🚀 Starting Snyk analysis at $(date)"
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Snyk CLI
        run: npm install -g snyk
      
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
      
      - name: Test Python dependencies
        run: |
          cd backend
          snyk test --file=pyproject.toml --package-manager=pip --severity-threshold=high
        continue-on-error: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node.js dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Test Node.js dependencies
        run: |
          cd frontend
          snyk test --file=package.json --severity-threshold=high
        continue-on-error: true
      
      - name: Run Snyk Code analysis with detailed output
        run: |
          snyk code test --sarif-file-output=snyk-code-results.sarif || true
          snyk code test --json-file-output=snyk-code-results.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
      
      - name: Collect Snyk metrics
        run: |
          chmod +x ./scripts/collect-metrics.sh
          ./scripts/collect-metrics.sh "Snyk" $SNYK_START_TIME
          echo "📊 Snyk metrics collected"
        if: always()
      
      - name: Upload Snyk metrics
        uses: actions/upload-artifact@v4
        with:
          name: snyk-metrics
          path: |
            performance-metrics.jsonl
            metrics/snyk-metrics.json
        if: always()
      
      - name: Upload Snyk results
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk-code-results.json
        if: always()

  metrics-aggregation:
    name: Aggregate Performance Metrics
    runs-on: ubuntu-latest
    needs: [sonarqube, codeql, semgrep, snyk]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-metrics*"
          merge-multiple: true
      
      - name: Debug - Show downloaded metrics
        run: |
          echo "=== Downloaded files ==="
          ls -la
          echo "=== Metrics directory ==="
          ls -la metrics/ 2>/dev/null || echo "No metrics directory"
          echo "=== Performance metrics file ==="
          if [ -f performance-metrics.jsonl ]; then
            echo "📄 performance-metrics.jsonl exists, content:"
            cat performance-metrics.jsonl | head -20
            echo "📊 Total lines in metrics file: $(wc -l < performance-metrics.jsonl)"
          else
            echo "❌ No performance-metrics.jsonl file found"
          fi
      
      - name: Merge metrics files (if multiple)
        run: |
          # If we have multiple performance-metrics.jsonl files, merge them
          if ls performance-metrics*.jsonl 1> /dev/null 2>&1; then
            echo "🔄 Merging multiple metrics files..."
            cat performance-metrics*.jsonl > merged-performance-metrics.jsonl
            mv merged-performance-metrics.jsonl performance-metrics.jsonl
            echo "✅ Merged $(wc -l < performance-metrics.jsonl) metric entries"
          fi
      
      - name: Generate performance report
        run: |
          echo "🔄 Generating performance report..."
          python scripts/generate-performance-report.py
      
      - name: Show generated files
        run: |
          echo "=== Generated files ==="
          ls -la *.html *.json* metrics/ 2>/dev/null || true
      
      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics-report
          path: |
            metrics/
            performance-report.html
            performance-metrics.jsonl
      
      - name: Check for performance regression
        run: |
          chmod +x ./scripts/check-performance-regression.py
          python scripts/check-performance-regression.py \
            --current-metrics performance-metrics.jsonl \
            --threshold 25
        continue-on-error: true