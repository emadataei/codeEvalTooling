name: PR Visual Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-visual-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.py
            **/*.js
            **/*.ts
            **/*.jsx
            **/*.tsx
            **/*.mjs
            **/*.cjs
            **/*.vue
            **/*.svelte
            **/*.java
            **/*.cs
            **/*.go
            **/*.rs
            sample-project/**/*.js
            sample-project/**/*.ts
            sample-project/**/*.jsx
            sample-project/**/*.tsx

      - name: Generate PR Visual Diagram
        run: |
          python3 << 'EOF'
          import os
          import json
          from pathlib import Path
          
          # Get changed files from GitHub Actions
          changed_files = "${{ steps.changed-files.outputs.all_changed_files }}".split()
          
          # Categorize files by type and location
          categories = {
              'Frontend': [],
              'Backend': [],
              'Tests': [],
              'Config': [],
              'Documentation': []
          }
          
          for file in changed_files:
              if not file.strip():
                  continue
                  
              path = Path(file)
              
              # Categorize by file type and location
              if any(ext in str(path) for ext in ['.tsx', '.jsx', '.vue', '.css', '.html']):
                  categories['Frontend'].append(file)
              elif any(ext in str(path) for ext in ['.py', '.js', '.ts', '.java', '.cs']):
                  if 'test' in file.lower() or 'spec' in file.lower():
                      categories['Tests'].append(file)
                  else:
                      categories['Backend'].append(file)
              elif any(ext in str(path) for ext in ['.json', '.yml', '.yaml', '.toml', '.ini']):
                  categories['Config'].append(file)
              elif any(ext in str(path) for ext in ['.md', '.txt', '.rst']):
                  categories['Documentation'].append(file)
              else:
                  categories['Backend'].append(file)  # Default category
          
          # Generate Mermaid diagram
          mermaid = ['```mermaid', 'graph TB']
          mermaid.append('    PR[Pull Request Changes]')
          
          node_id = 1
          for category, files in categories.items():
              if files:
                  cat_id = f'CAT{node_id}'
                  mermaid.append(f'    {cat_id}[{category}<br/>{len(files)} files]')
                  mermaid.append(f'    PR --> {cat_id}')
                  
                  # Add individual files (limit to 3 per category for readability)
                  for i, file in enumerate(files[:3]):
                      file_id = f'F{node_id}_{i}'
                      file_name = Path(file).name
                      mermaid.append(f'    {file_id}[{file_name}]')
                      mermaid.append(f'    {cat_id} --> {file_id}')
                  
                  if len(files) > 3:
                      more_id = f'MORE{node_id}'
                      mermaid.append(f'    {more_id}[... +{len(files)-3} more]')
                      mermaid.append(f'    {cat_id} --> {more_id}')
                  
                  node_id += 1
          
          # Add styling
          mermaid.extend([
              '    classDef frontend fill:#e1f5fe',
              '    classDef backend fill:#f3e5f5', 
              '    classDef tests fill:#e8f5e8',
              '    classDef config fill:#fff3e0',
              '    classDef docs fill:#fce4ec',
              '    class CAT1 frontend',
              '    class CAT2 backend', 
              '    class CAT3 tests',
              '    class CAT4 config',
              '    class CAT5 docs'
          ])
          
          mermaid.append('```')
          
          # Generate stats table
          stats = ['## 📊 Change Statistics', '']
          stats.append('| Category | Files | Impact |')
          stats.append('|----------|-------|--------|')
          
          total_files = sum(len(files) for files in categories.values())
          
          for category, files in categories.items():
              if files:
                  percentage = round((len(files) / total_files) * 100, 1)
                  impact = '🔴 High' if len(files) > 5 else '🟡 Medium' if len(files) > 2 else '🟢 Low'
                  stats.append(f'| {category} | {len(files)} | {impact} ({percentage}%) |')
          
          # Combine everything
          content = [
              '# 🎯 PR Visual Summary',
              '',
              '## 🗂️ File Changes Overview',
              ''
          ]
          content.extend(mermaid)
          content.extend([''] + stats)
          
          # Add quick navigation
          content.extend([
              '',
              '## 🔍 Quick Navigation',
              ''
          ])
          
          for category, files in categories.items():
              if files:
                  content.append(f'**{category}:**')
                  for file in files[:5]:  # Show up to 5 files
                      content.append(f'- `{file}`')
                  if len(files) > 5:
                      content.append(f'- ... and {len(files)-5} more files')
                  content.append('')
          
          # Write to file
          with open('pr-visual-summary.md', 'w') as f:
              f.write('\n'.join(content))
          
          print("Visual summary generated successfully!")
          EOF

      - name: Comment PR with Visual Summary
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: pr-visual-summary.md
          comment_tag: pr-visual-summary
          mode: recreate

      - name: Upload Visual Summary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-visual-summary
          path: pr-visual-summary.md
          retention-days: 30
